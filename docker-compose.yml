version: "3.8"

services:

  # ── Service 1: Pipeline ────────────────────────────────────────────────────
  pipeline:
    build: ./pipeline
    env_file: .env
    volumes:
      - pipeline_data:/app/data
      - reports:/app/reports
    restart: unless-stopped

  # ── Service 2: Streamlit Dashboard ────────────────────────────────────────
  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - pipeline_data:/app/data
      - reports:/app/reports
    restart: unless-stopped

# ── Shared Volumes ─────────────────────────────────────────────────────────
volumes:
  pipeline_data:
  reports:
